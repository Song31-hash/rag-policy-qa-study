embedding:
  model: text-embedding-3-small
  dimension: 1536

retrieval:
  top_k: 5

generation:
  model: gpt-4o-mini
  temperature: 0

paths:
  raw: data/raw
  processed: data/processed
  dataset: data/dataset
  questions_path: data/dataset/questions.json
  gold_path: data/dataset/gold_answers.json
  output_dir: experiments/adaptive/chunk_router

adaptive_paths:
  "256":
    chunks_path: data/processed/chunks_chunk256.json
    index_dir: data/indexes/chunk256

  "512":
    chunks_path: data/processed/chunks_chunk512.json
    index_dir: data/indexes/chunk512

  "1024":
    chunks_path: data/processed/chunks_chunk1024.json
    index_dir: data/indexes/chunk1024